<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
</head>
<body>

    <h2>Upload File</h2>

    <form action="http://localhost:3000/upload"
          method="POST"
          enctype="multipart/form-data">

        <label for="fileInput">Choose file to upload</label>
        <input id="fileInput" type="file" name="file" aria-label="File to upload">
        <button type="submit">Upload</button>

    </form>

</body>
</html>
