<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandName  Login</title>
    <style>
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --brand-primary: #c46b51;         
            --brand-primary-hover: #a8543b;  
            --brand-gold: #fbd46d;           
            --bg-page: #faf8f6;              
            --card-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --border-light: #eaeaea;
            --error-accent: #de3b3b;
        }

       
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-page);
            padding: 20px;
        }

        .login-brand-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand-logo {
            font-family: 'Brush Script MT', cursive;
            font-size: 54px;
            color: #ffffff;
            background-color: var(--brand-primary);
            padding: 10px 40px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(196, 107, 81, 0.2);
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.15);
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

      
        .login-card {
            background-color: var(--card-white);
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-light);
        }

   
        .login-header h1 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 12px;
            position: relative;
            display: inline-block;
        }

       
        .login-header h1::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 40px;
            height: 2px;
            background-color: var(--brand-primary);
            transition: width 0.3s ease;
        }

        .login-card:hover .login-header h1::after {
            width: 80px;
        }

        .login-header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        
        .form-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888888;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            font-size: 0.95rem;
            color: #2b2b2b;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(196, 107, 81, 0.1);
        }

        
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .remember-me input {
            accent-color: var(--brand-primary);
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .forgot-link {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .forgot-link:hover {
            color: var(--brand-primary-hover);
            text-decoration: underline;
        }

      
        .btn-submit {
            width: 100%;
            padding: 14px 36px;
            background-color: var(--brand-primary);
            color: white;
            border: 1px solid var(--brand-primary);
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(196, 107, 81, 0.2);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background-color: var(--brand-primary-hover);
            border-color: var(--brand-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(196, 107, 81, 0.3);
        }

        
        .error-banner {
            display: none;
            background-color: #fdf2f2;
            color: var(--error-accent);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid #f8d7d7;
            text-align: center;
        }
    </style>
</head>
<body>

   
    <header class="login-brand-header">
        <div class="brand-logo">BrandName</div>
    </header>

    <div class="login-card">
        <div class="login-header">
            <h1>Welcome<br>Back</h1>
            <p>Enter your details below to access your premium shopping panel.</p>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">Email Address</label>
                <input type="email" id="username" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    Remember me
                </label>
                <a href="#" class="forgot-link" onclick="handleForgot(event)">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>
    </div>

    
</body>
</html>
