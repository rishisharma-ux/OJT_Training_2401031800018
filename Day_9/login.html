<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <title>Login</title>
  <style>     
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body { 
      background-color: #faf8f6;
      color: #2b2b2b;
      min-height: 100vh;
    }

    .bg-theme { background-color: #c46b51 !important; }
    .text-theme { color: #c46b51 !important; }

    .brand-name {
      font-family: 'Brush Script MT', cursive;
      font-size: 42px;
      color: #fbd46d; 
      text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.15);
    }

    
    .custom-input {
      border: 1px solid #eaeaea !important;
    }
    .custom-input:focus {
      border-color: #c46b51 !important;
      box-shadow: 0 0 0 4px rgba(196, 107, 81, 0.12) !important;
    }

    
    .main-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .register-container {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 50px 40px;
      animation: premiumFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: box-shadow 0.4s ease;
    }
    
    .register-container:hover {
      box-shadow: 0 15px 40px rgba(196, 107, 81, 0.08) !important;
    }
    
    .form-title {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 2.2rem;
      position: relative;
    }

    .form-title::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 40px;
      height: 2px;
      background-color: #c46b51;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .register-container:hover .form-title::after {
      width: 80px;
    }

    @keyframes premiumFadeUp {
      0% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>  
</head>
<body class="d-flex flex-column">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
  <article class="d-flex flex-column flex-grow-1">
    <header class="bg-theme d-flex justify-content-between align-items-center px-4 py-3 shadow-sm">
       <a href="index.html" class="brand-name text-decoration-none lh-1" style="letter-spacing: 1px;">BrandName</a>
    </header>

    <main class="main-wrapper">
      <div class="register-container rounded-4 border shadow-sm">
        <h1 class="form-title fw-normal text-dark m-0 mb-4 pb-1">LogIn</h1>

        <form id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label small fw-bold text-uppercase text-muted m-0 mb-2" style="letter-spacing: 1px;">
              <i class="bi bi-person-fill me-1"></i> Email Address
            </label>
            <!-- Added custom-input class here -->
            <input type="email" id="email" class="form-control p-3 rounded-2 custom-input" placeholder="abc.def@example.com" required>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label small fw-bold text-uppercase text-muted m-0 mb-2" style="letter-spacing: 1px;">
              <i class="bi bi-lock-fill me-1"></i> Password
            </label>
            
            <input type="password" id="password" class="form-control p-3 rounded-2 custom-input" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn bg-theme text-white w-100 rounded-pill p-3 fw-bold text-uppercase shadow-sm" style="letter-spacing: 1px;">Log In</button>

          <div class="text-center mt-4 small text-secondary">
            Don't have an account? <a href="registration.html" class="text-theme text-decoration-none fw-medium link-danger">Create Account</a>
          </div>
        </form>
      </div>
    </main>
  </article>
</body>
</html>
